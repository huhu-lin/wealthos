name: Daily Pre-cache Popular ETFs

# 每天台灣時間 06:00（UTC 22:00）開盤前預先快取熱門 ETF
# 讓用戶第一次查詢時直接命中 Supabase，不需等 Render 抓資料
# GitHub Actions 免費方案每月 2000 分鐘，此 workflow 每次約 15-20 分鐘

on:
  schedule:
    - cron: "0 22 * * *"   # 每天 UTC 22:00 = 台灣時間 06:00（開盤前取前一日收盤資料）
  workflow_dispatch:        # 允許手動觸發（新增 ticker 後可立即跑一次）

jobs:
  precache:
    runs-on: ubuntu-latest
    timeout-minutes: 50

    steps:
      - name: Cleanup old cache (keep last 3 days only)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          # 刪除 3 天前的快取，避免 Supabase Free 500MB 爆掉
          # 保留最近 3 天：今天 + 昨天 + 前天（避免時區邊界問題）
          CUTOFF=$(date -d "3 days ago" +%Y-%m-%d)
          echo "刪除 $CUTOFF 之前的快取..."
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X DELETE \
            "${SUPABASE_URL}/rest/v1/kline_cache?cached_date=lt.${CUTOFF}" \
            -H "apikey: ${SUPABASE_SERVICE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_KEY}")
          echo "清理完成，HTTP $STATUS"

      - name: Pre-cache Taiwan ETFs
        run: |
          BASE="https://wealthos-kline.onrender.com"
          DAYS=9999

          TW_TICKERS=("0050" "0056" "006208" "00878" "00646" "00675L" "00631L" "00692" "00757")

          echo "=== 台股 ETF 預載開始 ==="
          for t in "${TW_TICKERS[@]}"; do
            echo "→ 預載 $t ($DAYS 天)..."
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 120 \
              "$BASE/kline/tw?ticker=$t&days=$DAYS" || echo "timeout")
            echo "  $t → HTTP $STATUS"
            sleep 3
          done
          echo "=== 台股 ETF 預載完成 ==="

      - name: Pre-cache US ETFs and Leveraged ETFs
        run: |
          BASE="https://wealthos-kline.onrender.com"
          DAYS=9999

          US_TICKERS=("SPY" "QQQ" "VOO" "VTI" "VT" "QLD" "TQQQ" "SSO" "UPRO")

          echo "=== 美股 ETF 預載開始 ==="
          # 美股 9999 天資料量大（SPY/QQQ 各 ~640KB），yfinance 抓取需 60-120 秒
          # max-time 200 = 3min 20s，足夠應付大型 ETF；job timeout-minutes=50 覆蓋整輪
          for t in "${US_TICKERS[@]}"; do
            echo "→ 預載 $t ($DAYS 天)..."
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 200 \
              "$BASE/kline/us?ticker=$t&days=$DAYS" || echo "timeout")
            echo "  $t → HTTP $STATUS"
            sleep 3
          done
          echo "=== 美股 ETF 預載完成 ==="

      - name: Summary
        run: |
          echo "✅ 每日預載完成，快取已更新至今日"
          echo "用戶查詢以上 ticker 將直接命中 Supabase，無需等待 Render 抓取"
