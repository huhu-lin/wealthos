name: Daily Pre-cache Taiwan ETFs

# 每天台灣時間 06:00（UTC 22:00）開盤前預先快取台股 ETF
# 美股 ETF 改由 daily-precache-us.yml 在 UTC 23:30 執行
# 原因：yfinance 美股資料在收盤後（UTC 20:00）需要約 1.5-3 小時才穩定更新
# 分離執行確保美股資料新鮮度
# GitHub Actions 免費方案每月 2000 分鐘，此 workflow 每次約 8-12 分鐘

on:
  schedule:
    - cron: "0 22 * * *"   # 每天 UTC 22:00 = 台灣時間 06:00（台股開盤前）
  workflow_dispatch:        # 允許手動觸發

jobs:
  precache-tw:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Cleanup old cache (keep last 3 days only)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          # 刪除 3 天前的快取，避免 Supabase Free 500MB 爆掉
          CUTOFF=$(date -d "3 days ago" +%Y-%m-%d)
          echo "刪除 $CUTOFF 之前的快取..."
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X DELETE \
            "${SUPABASE_URL}/rest/v1/kline_cache?cached_date=lt.${CUTOFF}" \
            -H "apikey: ${SUPABASE_SERVICE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_KEY}")
          echo "清理完成，HTTP $STATUS"

      - name: Pre-cache Taiwan ETFs
        run: |
          BASE="https://wealthos-kline.onrender.com"
          DAYS=9999

          TW_TICKERS=("0050" "0056" "006208" "00878" "00646" "00675L" "00631L" "00692" "00757")

          echo "=== 台股 ETF 預載開始 ==="
          for t in "${TW_TICKERS[@]}"; do
            echo "→ 預載 $t ($DAYS 天)..."
            # 0050（2003上市）與 0056（2007上市）歷史資料長，需較長 timeout
            # 其他新 ETF 120s 綽綽有餘；統一改 300s 確保全部 ticker 不超時
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 300 \
              "$BASE/kline/tw?ticker=$t&days=$DAYS" || echo "timeout")
            echo "  $t → HTTP $STATUS"
            sleep 3
          done
          echo "=== 台股 ETF 預載完成 ==="

      - name: Summary
        run: |
          echo "✅ 台股每日預載完成"
          echo "美股預載由 daily-precache-us.yml 在 UTC 23:30 執行"
